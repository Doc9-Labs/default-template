name: Deploy to Hub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2222
          script: |
            APP_DIR="/home/ubuntu/apps/${{ secrets.APP_SUBDOMAIN }}"
            cd "$APP_DIR"
            git pull origin main
            npm install --production
            npm run build 2>/dev/null || true
            cp /home/ubuntu/doc9-hub/shared/.env.shared .env.shared 2>/dev/null || true
            pm2 restart ${{ secrets.APP_SUBDOMAIN }} || pm2 start server.js --name "${{ secrets.APP_SUBDOMAIN }}"
